<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Extraction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Corporate Extraction</h1>
        </header>
        
        <main>
            <div id="boss-container">
                <h2>The Boss</h2>
                <div class="health-bar-bg">
                    <div id="health-bar" class="health-bar-fill"></div>
                </div>
                <p>Health: <span id="health-text">10000</span> / 10000</p>
            </div>

            <div id="timer-container">
                <h3>Time to Extraction: <span id="timer-text">60</span>s</h3>
            </div>

            <div class="actions">
                <button id="attack-btn" class="vapor-btn">Work (Attack!)</button>
                <button id="extract-btn" class="vapor-btn">Clock Out (Extract)</button>
            </div>
            
            <div id="stats-container">
                <p>Salary Secured: $<span id="loot-text">0</span></p>
            </div>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
